services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: foxgen
      POSTGRES_USER: foxgen
      POSTGRES_PASSWORD: foxgen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxgen -d foxgen"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  migrate:
    build: .
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    env_file: .env
    command: ["foxgen-api"]
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    command: ["foxgen-worker"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  bot:
    build: .
    env_file: .env
    command: ["foxgen-bot"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
