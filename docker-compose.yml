services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: foxgen
      POSTGRES_USER: foxgen
      POSTGRES_PASSWORD: foxgen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxgen -d foxgen"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: foxgen
      MINIO_ROOT_PASSWORD: foxgen-development-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 foxgen foxgen-development-secret; do sleep 2; done
        mc mb --ignore-existing local/foxgen-media

  migrate:
    build: .
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    env_file: .env
    command: ["foxgen-api"]
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    command: ["foxgen-worker"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  bot:
    build: .
    env_file: .env
    command: ["foxgen-bot"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
