name: foxgen

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "5"

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  image: foxgen:${FOXGEN_IMAGE_TAG:-latest}
  env_file:
    - .env
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging: *default-logging
  networks:
    - backend

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FOXGEN_POSTGRES_DB:-foxgen}
      POSTGRES_USER: ${FOXGEN_POSTGRES_USER:-foxgen}
      POSTGRES_PASSWORD: ${FOXGEN_POSTGRES_PASSWORD:?FOXGEN_POSTGRES_PASSWORD is required}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      FOXGEN_REDIS_PASSWORD: ${FOXGEN_REDIS_PASSWORD:?FOXGEN_REDIS_PASSWORD is required}
    command:
      - /bin/sh
      - -ec
      - exec redis-server --appendonly yes --requirepass "$${FOXGEN_REDIS_PASSWORD}"
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${FOXGEN_REDIS_PASSWORD}" ping | grep -q PONG
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command:
      - server
      - /data
    environment:
      MINIO_ROOT_USER: ${FOXGEN_S3_ACCESS_KEY_ID:?FOXGEN_S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${FOXGEN_S3_SECRET_ACCESS_KEY:?FOXGEN_S3_SECRET_ACCESS_KEY is required}
    volumes:
      - minio_data:/data
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${FOXGEN_S3_ACCESS_KEY_ID:?FOXGEN_S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${FOXGEN_S3_SECRET_ACCESS_KEY:?FOXGEN_S3_SECRET_ACCESS_KEY is required}
      MINIO_BUCKET: ${FOXGEN_S3_BUCKET:-foxgen-media}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
    depends_on:
      minio:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend

  migrate:
    <<: *app-service
    restart: "no"
    command:
      - alembic
      - upgrade
      - head
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app-service
    command:
      - foxgen-api
    ports:
      - 127.0.0.1:${FOXGEN_PUBLIC_API_PORT:-8080}:8080
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=3).read()
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    <<: *app-service
    command:
      - foxgen-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  bot:
    <<: *app-service
    command:
      - foxgen-bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  backend:
    driver: bridge
