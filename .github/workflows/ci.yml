name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate hashed locks
        run: |
          python -m pip install --disable-pip-version-check pip-tools==7.6.0
          CUSTOM_COMPILE_COMMAND="make lock" pip-compile pyproject.toml \
            --resolver backtracking \
            --generate-hashes \
            --allow-unsafe \
            --strip-extras \
            --output-file requirements.lock
          CUSTOM_COMPILE_COMMAND="make lock" pip-compile pyproject.toml \
            --extra dev \
            --constraint requirements.lock \
            --resolver backtracking \
            --generate-hashes \
            --allow-unsafe \
            --strip-extras \
            --output-file requirements-dev.lock
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-locks
          path: |
            requirements.lock
            requirements-dev.lock
          if-no-files-found: error
          retention-days: 1

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Normalize and lint
        run: |
          ruff check --fix .
          ruff format .
      - name: Type check
        id: mypy
        run: mypy src 2>&1 | tee mypy.log
      - name: Publish type-check diagnostics
        if: always() && github.event_name == 'pull_request' && steps.mypy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('mypy.log', 'utf8').slice(-60000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## CI type-check diagnostics\n\n\`\`\`text\n${report}\n\`\`\``
            });
      - name: Tests
        id: tests
        run: pytest -q 2>&1 | tee pytest.log
      - name: Publish test diagnostics
        if: always() && github.event_name == 'pull_request' && steps.tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('pytest.log', 'utf8').slice(-60000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## CI test diagnostics\n\n\`\`\`text\n${report}\n\`\`\``
            });

  container:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: foxgen:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
