name: Deploy production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Main commit SHA to deploy; leave empty for the current workflow commit
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: foxgen-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy tested main commit
    if: >-
      ${{
        vars.AUTODEPLOY_ENABLED == 'true' &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.head_branch == 'main'
          )
        )
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment:
      name: production

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || 'root' }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/root/foxgen' }}
      DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.prod.yml' }}
      EXPECTED_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.commit_sha || github.sha }}

    steps:
      - name: Validate deployment configuration
        shell: bash
        run: |
          set -Eeuo pipefail
          : "${DEPLOY_HOST:?Missing production secret DEPLOY_HOST}"
          : "${DEPLOY_SSH_PRIVATE_KEY:?Missing production secret DEPLOY_SSH_PRIVATE_KEY}"
          : "${DEPLOY_KNOWN_HOSTS:?Missing production secret DEPLOY_KNOWN_HOSTS}"
          : "${DEPLOY_USER:?Missing production variable DEPLOY_USER}"
          : "${DEPLOY_PORT:?Missing production variable DEPLOY_PORT}"
          : "${DEPLOY_PATH:?Missing production variable DEPLOY_PATH}"
          : "${DEPLOY_COMPOSE_FILE:?Missing production variable DEPLOY_COMPOSE_FILE}"
          : "${EXPECTED_SHA:?Unable to resolve deployment commit SHA}"
          [[ "${EXPECTED_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "EXPECTED_SHA must be a full 40-character Git commit SHA" >&2
            exit 1
          }

      - name: Check out tested commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ env.EXPECTED_SHA }}
          fetch-depth: 1

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy tested commit
        shell: bash
        run: |
          set -Eeuo pipefail
          printf -v remote_command \
            'DEPLOY_PATH=%q FOXGEN_COMPOSE_FILE=%q bash -s -- %q' \
            "$DEPLOY_PATH" "$DEPLOY_COMPOSE_FILE" "$EXPECTED_SHA"

          ssh \
            -i "$HOME/.ssh/id_ed25519" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "$remote_command" \
            < scripts/deploy-production.sh

      - name: Record deployment summary
        shell: bash
        run: |
          {
            echo "## FoxGen production deployment"
            echo
            echo "- Commit: \`${EXPECTED_SHA}\`"
            echo "- Target: \`${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}\`"
            echo "- Compose: \`${DEPLOY_COMPOSE_FILE}\`"
          } >> "$GITHUB_STEP_SUMMARY"
