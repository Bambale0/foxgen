name: Bootstrap dependency locks

on:
  push:
    branches: [feat/reproducible-real-infra-ci]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate hashed locks
        run: |
          python -m pip install --disable-pip-version-check pip-tools==7.6.0
          CUSTOM_COMPILE_COMMAND="make lock" pip-compile pyproject.toml \
            --resolver backtracking \
            --generate-hashes \
            --allow-unsafe \
            --strip-extras \
            --output-file requirements.lock
          CUSTOM_COMPILE_COMMAND="make lock" pip-compile pyproject.toml \
            --extra dev \
            --constraint requirements.lock \
            --resolver backtracking \
            --generate-hashes \
            --allow-unsafe \
            --strip-extras \
            --output-file requirements-dev.lock
      - uses: actions/upload-artifact@v4
        with:
          name: dependency-locks
          path: |
            requirements.lock
            requirements-dev.lock
          if-no-files-found: error
          retention-days: 1
